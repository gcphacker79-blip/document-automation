name: Generate Documentation

on:
  pull_request:
    types: [closed]
    branches:
      - release-*

permissions:
  contents: read
  models: read

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Read changed files, call LLM, generate DOCX
  # ─────────────────────────────────────────────
  generate-docs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      docx_file:      ${{ steps.generate.outputs.docx_file }}
      doc_title:      ${{ steps.generate.outputs.doc_title }}
      should_publish: ${{ steps.check-label.outputs.should_publish }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Check PR labels for doc type — PR title becomes the doc title
      - name: Check PR label
        id: check-label
        run: |
          LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          echo "Labels on PR : '$LABELS'"
          echo "PR Title     : '$PR_TITLE'"

          DOC_TYPE=$(echo "$LABELS" | grep -oP 'doc:\K\w+' | head -1)

          if [ -z "$DOC_TYPE" ]; then
            echo "No doc label found — bug fix or no documentation needed. Skipping."
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Doc Type  : '$DOC_TYPE'"
            echo "Doc Title : '$PR_TITLE'"
            echo "should_publish=true"    >> $GITHUB_OUTPUT
            echo "doc_type=$DOC_TYPE"     >> $GITHUB_OUTPUT
            echo "doc_title=$PR_TITLE"    >> $GITHUB_OUTPUT
          fi

      # Get list of files changed in this PR
      - name: Get changed files
        if: steps.check-label.outputs.should_publish == 'true'
        id: changed-files
        run: |
          FILES=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            | tr '\n' ',')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files: $FILES"

      - name: Setup Node.js
        if: steps.check-label.outputs.should_publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install doc automation dependencies
        if: steps.check-label.outputs.should_publish == 'true'
        run: npm install openai docx mammoth axios dotenv adm-zip

      # Call GitHub Models (GPT-4o) → generate DOCX using template
      - name: Generate documentation with GitHub Models
        if: steps.check-label.outputs.should_publish == 'true'
        id: generate
        env:
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          DOC_TYPE:      ${{ steps.check-label.outputs.doc_type }}
          DOC_TITLE:     ${{ steps.check-label.outputs.doc_title }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
        run: node generate-with-ai.js

      # Upload DOCX so you can download and review before approving
      - name: Upload DOCX for review
        if: steps.check-label.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: documentation-pr-${{ github.event.pull_request.number }}
          path: generated-docs/
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 2: Wait for approval → publish to Confluence
  # Paused until you approve in GitHub Actions UI
  # ─────────────────────────────────────────────
  publish-to-confluence:
    needs: generate-docs
    if: >
      needs.generate-docs.result == 'success' &&
      needs.generate-docs.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: confluence-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the DOCX generated in Job 1
      - name: Download DOCX artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation-pr-${{ github.event.pull_request.number }}
          path: generated-docs/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install doc automation dependencies
        run: npm install openai docx mammoth axios dotenv adm-zip

      # Publish DOCX to Confluence as a new page
      - name: Publish to Confluence
        env:
          CONFLUENCE_BASE_URL:       ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_USER:           ${{ secrets.CONFLUENCE_USER }}
          CONFLUENCE_API_TOKEN:      ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY:      ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
          DOCX_FILE:                 ${{ needs.generate-docs.outputs.docx_file }}
          TITLE:                     ${{ needs.generate-docs.outputs.doc_title }}
        run: node publish_sop_to_confluence.js --mode publish
